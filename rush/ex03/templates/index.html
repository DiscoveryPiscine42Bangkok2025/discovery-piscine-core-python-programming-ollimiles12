<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>My Chess Project</title>
</head>

<body>
    <div id="main">
        <div class="header">
            <h1>Chess</h1>
            <p>Setup a puzzle or Play! Current turn: White</p>
        </div>

        <div class="game-container">

            <div class="board">
                <!-- Row 1 -->
                <div id="0-0" class="square white" data-r="0" data-c="0"></div>
                <div id="0-1" class="square black" data-r="0" data-c="1"></div>
                <div id="0-2" class="square white" data-r="0" data-c="2"></div>
                <div id="0-3" class="square black" data-r="0" data-c="3"></div>
                <div id="0-4" class="square white" data-r="0" data-c="4"></div>
                <div id="0-5" class="square black" data-r="0" data-c="5"></div>
                <div id="0-6" class="square white" data-r="0" data-c="6"></div>
                <div id="0-7" class="square black" data-r="0" data-c="7"></div>
                <!-- Row 2 -->
                <div id="1-0" class="square black" data-r="1" data-c="0"></div>
                <div id="1-1" class="square white" data-r="1" data-c="1"></div>
                <div id="1-2" class="square black" data-r="1" data-c="2"></div>
                <div id="1-3" class="square white" data-r="1" data-c="3"></div>
                <div id="1-4" class="square black" data-r="1" data-c="4"></div>
                <div id="1-5" class="square white" data-r="1" data-c="5"></div>
                <div id="1-6" class="square black" data-r="1" data-c="6"></div>
                <div id="1-7" class="square white" data-r="1" data-c="7"></div>
                <!-- Row 3 -->
                <div id="2-0" class="square white" data-r="2" data-c="0"></div>
                <div id="2-1" class="square black" data-r="2" data-c="1"></div>
                <div id="2-2" class="square white" data-r="2" data-c="2"></div>
                <div id="2-3" class="square black" data-r="2" data-c="3"></div>
                <div id="2-4" class="square white" data-r="2" data-c="4"></div>
                <div id="2-5" class="square black" data-r="2" data-c="5"></div>
                <div id="2-6" class="square white" data-r="2" data-c="6"></div>
                <div id="2-7" class="square black" data-r="2" data-c="7"></div>
                <!-- Row 4 -->
                <div id="3-0" class="square black" data-r="3" data-c="0"></div>
                <div id="3-1" class="square white" data-r="3" data-c="1"></div>
                <div id="3-2" class="square black" data-r="3" data-c="2"></div>
                <div id="3-3" class="square white" data-r="3" data-c="3"></div>
                <div id="3-4" class="square black" data-r="3" data-c="4"></div>
                <div id="3-5" class="square white" data-r="3" data-c="5"></div>
                <div id="3-6" class="square black" data-r="3" data-c="6"></div>
                <div id="3-7" class="square white" data-r="3" data-c="7"></div>
                <!-- Row 5 -->
                <div id="4-0" class="square white" data-r="4" data-c="0"></div>
                <div id="4-1" class="square black" data-r="4" data-c="1"></div>
                <div id="4-2" class="square white" data-r="4" data-c="2"></div>
                <div id="4-3" class="square black" data-r="4" data-c="3"></div>
                <div id="4-4" class="square white" data-r="4" data-c="4"></div>
                <div id="4-5" class="square black" data-r="4" data-c="5"></div>
                <div id="4-6" class="square white" data-r="4" data-c="6"></div>
                <div id="4-7" class="square black" data-r="4" data-c="7"></div>
                <!-- Row 6 -->
                <div id="5-0" class="square black" data-r="5" data-c="0"></div>
                <div id="5-1" class="square white" data-r="5" data-c="1"></div>
                <div id="5-2" class="square black" data-r="5" data-c="2"></div>
                <div id="5-3" class="square white" data-r="5" data-c="3"></div>
                <div id="5-4" class="square black" data-r="5" data-c="4"></div>
                <div id="5-5" class="square white" data-r="5" data-c="5"></div>
                <div id="5-6" class="square black" data-r="5" data-c="6"></div>
                <div id="5-7" class="square white" data-r="5" data-c="7"></div>
                <!-- Row 7 -->
                <div id="6-0" class="square white" data-r="6" data-c="0"></div>
                <div id="6-1" class="square black" data-r="6" data-c="1"></div>
                <div id="6-2" class="square white" data-r="6" data-c="2"></div>
                <div id="6-3" class="square black" data-r="6" data-c="3"></div>
                <div id="6-4" class="square white" data-r="6" data-c="4"></div>
                <div id="6-5" class="square black" data-r="6" data-c="5"></div>
                <div id="6-6" class="square white" data-r="6" data-c="6"></div>
                <div id="6-7" class="square black" data-r="6" data-c="7"></div>
                <!-- Row 8 -->
                <div id="7-0" class="square black" data-r="7" data-c="0"></div>
                <div id="7-1" class="square white" data-r="7" data-c="1"></div>
                <div id="7-2" class="square black" data-r="7" data-c="2"></div>
                <div id="7-3" class="square white" data-r="7" data-c="3"></div>
                <div id="7-4" class="square black" data-r="7" data-c="4"></div>
                <div id="7-5" class="square white" data-r="7" data-c="5"></div>
                <div id="7-6" class="square black" data-r="7" data-c="6"></div>
                <div id="7-7" class="square white" data-r="7" data-c="7"></div>
            </div>

            <div class="controls">
                <button id="resetBtn">Reset Board</button>
                <div id="result" class="result">Ready</div>
                <textarea id="boardInput" style="display:none;"></textarea>
                <div class="piece-selector">
                    <p>Add Pieces:</p>
                    <button id="colorToggleBtn">Placing: ⬜ White</button>
                    <div class="piece-row">
                        <button class="addBtn" data-piece="king">♚</button>
                        <button class="addBtn" data-piece="queen">♛</button>
                        <button class="addBtn" data-piece="rook">♜</button>
                        <button class="addBtn" data-piece="bishop">♝</button>
                        <button class="addBtn" data-piece="knight">♞</button>
                        <button class="addBtn" data-piece="pawn">♟</button>
                    </div>
                    <button id="clearBtn">Clear</button>
                </div>

                <div class="bot-controls">
                    <p class="bot-title">🤖 PLAY WITH BOT</p>
                    <div class="bot-row">
                        <button id="botToggleBtn" class="bot-toggle-btn">Bot: OFF</button>
                    </div>
                    <div class="bot-row">
                        <label for="eloSelect" class="bot-label">Difficulty</label>
                        <select id="eloSelect" class="botselect">
                            <option value="100">100 — Beginner</option>
                            <option value="800">800 — Novice</option>
                            <option value="1500" selected>1500 — Intermediate</option>
                            <option value="2500">2500 — Advanced</option>
                            <option value="3000">3000 — Grandmaster</option>
                        </select>
                    </div>
                </div>

                <div class="time">
                    <p style="font-weight:bold;margin-bottom:8px;opacity:0.8;letter-spacing:1px;">&#9201; CLOCK</p>
                    <div id="digital-clock" class="digital-clock">&#x2B1C; 10:00 &nbsp;|&nbsp; &#x2B1B; 10:00</div>
                    <button id="timeBtn">&#x25B6; Start Timer</button>
                </div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='gameController.js') }}"></script>
</body>

</html>
